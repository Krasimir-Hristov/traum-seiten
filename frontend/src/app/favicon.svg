<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="favGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe259" />
      <stop offset="100%" style="stop-color:#d4a017" />
    </linearGradient>
    <filter id="favGlow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Circular Dark Background -->
  <circle cx="32" cy="32" r="30" fill="#0f0f1e" />
  
  <!-- Stylized Moon -->
  <g filter="url(#favGlow)">
    <path d="M32,12 A20,20 0 1,0 52,32 A16,16 0 1,1 32,12 Z" fill="url(#favGold)" />
  </g>
  
  <!-- Accent Star -->
  <path d="M48,16 L49,20 L53,21 L49,22 L48,26 L47,22 L43,21 L47,20 Z" fill="#ffe259" filter="url(#favGlow)" />
</svg>
